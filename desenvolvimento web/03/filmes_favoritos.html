<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus filmes favoritos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="titulo">
      <h1>Meus filmes favoritos</h1>
    </div>

    <div class="container">
      <div class="galeria">
        <div class="container-filme">
          <div class="img">
            <img src="./img/bastardos-inglorios.jpg" class="poster" />
          </div>
          <p>Bastardos Inglorios</p>
        </div>

        <div class="container-filme">
          <div class="img">
            <img src="./img/homem-aranha-aranhaverso.jpg" class="poster" />
          </div>
          <p>Homem-Aranha no Aranhaverso</p>
        </div>

        <div class="container-filme">
          <div class="img">
            <img src="./img/Parasite.jpg" class="poster" />
          </div>
          <p>Parasita</p>
        </div>

      </div>
    </div>

    <div id="rodape">
      <footer>
        <a target="_blank" href="https://gui-ccr-dev.vercel.app/">© 2026 - Feito por Guilherme Rodrigues</a>
      </footer>
    </div>
    
  </body>
</html>
